  <!-- 메인 -->
  <main class="login-main reg-main">
    <div class="login-card reg-card find-card">

      <!-- 카드 헤더 -->
      <div class="reg-card-header">
        <div>
          <h1 class="reg-title">아이디 찾기</h1>
          <p class="reg-subtitle">가입 시 등록한 이름과 전화번호로 아이디를 찾습니다</p>
        </div>
        <button type="button" class="reg-close-btn" onclick="window.location.href='index.html'" title="닫기">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <!-- 탭 -->
      <div class="find-tab-wrap">
        <button class="find-tab active" id="tab-phone" onclick="switchFindTab('phone')">
          <i class="fas fa-mobile-alt"></i> 전화번호로 찾기
        </button>
        <button class="find-tab" id="tab-name" onclick="switchFindTab('name')">
          <i class="fas fa-user"></i> 이름으로 찾기
        </button>
      </div>

      <!-- 전화번호 탭 콘텐츠 -->
      <div id="panel-phone" class="find-panel">
        <form onsubmit="findIdByPhone(event)" novalidate>
          <div class="reg-field" style="margin-bottom:14px">
            <label class="reg-label" for="fi-name-p">이름 <span class="req">*</span></label>
            <input type="text" id="fi-name-p" class="reg-input" placeholder="가입 시 등록한 이름" />
            <span class="field-msg" id="msg-fi-name-p"></span>
          </div>
          <div class="reg-field" style="margin-bottom:20px">
            <label class="reg-label" for="fi-tel">전화번호 <span class="req">*</span></label>
            <input type="tel" id="fi-tel" class="reg-input" placeholder="010-0000-0000" maxlength="13" />
            <span class="field-msg" id="msg-fi-tel"></span>
          </div>
          <button type="submit" class="reg-btn">
            <i class="fas fa-search"></i> 아이디 찾기
          </button>
        </form>
      </div>

      <!-- 이름 탭 콘텐츠 -->
      <div id="panel-name" class="find-panel hidden">
        <form onsubmit="findIdByDept(event)" novalidate>
          <div class="reg-field" style="margin-bottom:14px">
            <label class="reg-label" for="fi-name-d">이름 <span class="req">*</span></label>
            <input type="text" id="fi-name-d" class="reg-input" placeholder="가입 시 등록한 이름" />
            <span class="field-msg" id="msg-fi-name-d"></span>
          </div>
          <div class="reg-field" style="margin-bottom:20px">
            <label class="reg-label" for="fi-dept">소속 부서 <span class="req">*</span></label>
            <select id="fi-dept" class="reg-input reg-select">
              <option value="">부서를 선택하세요</option>
              <option value="평택TC">평택TC</option>
              <option value="인천TC">인천TC</option>
              <option value="목포TC">목포TC</option>
              <option value="화성TDC">화성TDC</option>
              <option value="광주TDC">광주TDC</option>
              <option value="HVAC">HVAC</option>
              <option value="냉장사업부">냉장사업부</option>
            </select>
            <span class="field-msg" id="msg-fi-dept"></span>
          </div>
          <button type="submit" class="reg-btn">
            <i class="fas fa-search"></i> 아이디 찾기
          </button>
        </form>
      </div>

      <!-- 결과 영역 -->
      <div id="find-id-result" class="find-result hidden"></div>

      <!-- 하단 링크 -->
      <div class="find-bottom-links">
        <a href="index.html"><i class="fas fa-arrow-left"></i> 로그인으로</a>
        <span class="f-sep">|</span>
        <a href="find-pw.html">비밀번호 찾기</a>
        <span class="f-sep">|</span>
        <a href="register.html">회원가입</a>
      </div>
