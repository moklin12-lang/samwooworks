<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <defs>
    <radialGradient id="fMedalOuter" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="40%"  stop-color="#E8ECF0"/>
      <stop offset="80%"  stop-color="#C8D0DA"/>
      <stop offset="100%" stop-color="#A0AABB"/>
    </radialGradient>
    <radialGradient id="fMedalInner" cx="42%" cy="36%" r="60%">
      <stop offset="0%"   stop-color="#F0F4F8"/>
      <stop offset="50%"  stop-color="#D8DFE8"/>
      <stop offset="100%" stop-color="#B8C4D0"/>
    </radialGradient>
    <linearGradient id="fShieldGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#F0F4F8"/>
      <stop offset="30%"  stop-color="#D0D8E4"/>
      <stop offset="60%"  stop-color="#A8B8C8"/>
      <stop offset="100%" stop-color="#7890A8"/>
    </linearGradient>
    <radialGradient id="fSirenDome" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#AAFFCC"/>
      <stop offset="40%"  stop-color="#38D068"/>
      <stop offset="100%" stop-color="#145530"/>
    </radialGradient>
    <filter id="fMedalShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000044"/>
    </filter>
  </defs>
  <circle cx="100" cy="120" r="90" fill="url(#fMedalOuter)" filter="url(#fMedalShadow)"/>
  <circle cx="100" cy="120" r="90" fill="none" stroke="#90A0B0" stroke-width="1.5"/>
  <circle cx="100" cy="120" r="80" fill="url(#fMedalInner)"/>
  <circle cx="100" cy="120" r="80" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.7"/>
  <path d="M100,166 L65,151 L63,104 Q63,92 71,86 L100,74 L129,86 Q137,92 137,104 L135,151 Z"
        fill="url(#fShieldGrad)"/>
  <path d="M100,166 L65,151 L63,104 Q63,92 71,86 L100,74 L129,86 Q137,92 137,104 L135,151 Z"
        fill="none" stroke="#5A6A7A" stroke-width="2.5"/>
  <line x1="100" y1="74" x2="100" y2="166" stroke="#5A6A7A" stroke-width="1.2" stroke-opacity="0.6"/>
  <!-- SW 그림자 -->
  <text x="102" y="138" font-family="Arial Black, Impact, sans-serif"
    font-size="44" font-weight="900" text-anchor="middle"
    fill="#7A4000" fill-opacity="0.5" letter-spacing="-2">SW</text>
  <!-- SW 외곽선 -->
  <text x="100" y="136" font-family="Arial Black, Impact, sans-serif"
    font-size="44" font-weight="900" text-anchor="middle"
    fill="none" stroke="#7A4800" stroke-width="5" stroke-linejoin="round" letter-spacing="-2">SW</text>
  <!-- SW 본체 노란색 -->
  <text x="100" y="136" font-family="Arial Black, Impact, sans-serif"
    font-size="44" font-weight="900" text-anchor="middle"
    fill="#FFB800" letter-spacing="-2">SW</text>
  <!-- 받침대 -->
  <rect x="93" y="28" width="14" height="10" rx="2" fill="#C8D4E0" stroke="#6A7A8A" stroke-width="1"/>
  <rect x="90" y="25" width="20" height="5" rx="2" fill="#C8D4E0" stroke="#6A7A8A" stroke-width="1"/>
  <!-- 돔 -->
  <ellipse cx="100" cy="22" rx="13" ry="9" fill="url(#fSirenDome)" stroke="#228844" stroke-width="1.5"/>
  <ellipse cx="95" cy="19" rx="4" ry="3" fill="#AAFFCC" opacity="0.7"/>
</svg>
