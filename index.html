  <!-- 메인 콘텐츠 -->
  <main class="login-main">
    <div class="login-card">

      <h1 class="login-title">로그인</h1>

      <form id="login-form" class="login-form" onsubmit="handleLogin(event)">

        <!-- 아이디 -->
        <div class="form-group">
          <label class="form-label" for="user-id">아이디</label>
          <input
            type="text"
            id="user-id"
            class="form-input"
            placeholder="아이디를 입력하세요"
            autocomplete="username"
          />
        </div>

        <!-- 비밀번호 -->
        <div class="form-group">
          <div class="label-row">
            <label class="form-label" for="user-pw">비밀번호</label>
            <a href="#" class="pw-reset-link" onclick="showMsg('비밀번호 재설정 페이지로 이동합니다.')">비밀번호 재설정</a>
          </div>
          <div class="pw-input-wrap">
            <input
              type="password"
              id="user-pw"
              class="form-input"
              placeholder="비밀번호를 입력하세요"
              autocomplete="current-password"
            />
            <button type="button" class="pw-toggle-btn" onclick="togglePw()" title="비밀번호 보기">
              <i class="fas fa-eye" id="pw-eye-icon"></i>
            </button>
          </div>
        </div>

        <!-- 로그인 상태 유지 -->
        <div class="remember-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me" class="checkbox-input" />
            <span class="checkbox-custom"></span>
            <span class="checkbox-text">로그인 상태 유지</span>
          </label>
        </div>

        <!-- 오류 메시지 -->
        <div id="login-error" class="login-error hidden">
          <i class="fas fa-exclamation-circle"></i>
          <span id="error-text">아이디 또는 비밀번호를 확인해주세요.</span>
        </div>

        <!-- 로그인 버튼 -->
        <button type="submit" class="login-btn" id="login-btn">
          <span id="btn-text">로그인</span>
          <span id="btn-spinner" class="btn-spinner hidden">
            <i class="fas fa-spinner fa-spin"></i>
          </span>
        </button>

      </form>

      <!-- 하단 링크 -->
      <div class="login-links">
        <a href="register.html">회원가입</a>
        <span class="divider">|</span>
        <a href="find-id.html">아이디 찾기</a>
        <span class="divider">|</span>
        <a href="find-pw.html">비밀번호 찾기</a>
      </div>
