  <!-- 메인 -->
  <main class="login-main reg-main">
    <div class="login-card reg-card find-card">

      <!-- 카드 헤더 -->
      <div class="reg-card-header">
        <div>
          <h1 class="reg-title">비밀번호 찾기</h1>
          <p class="reg-subtitle">가입 시 등록한 정보로 비밀번호를 재설정합니다</p>
        </div>
        <button type="button" class="reg-close-btn" onclick="window.location.href='index.html'" title="닫기">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <!-- 스텝 표시 -->
      <div class="find-steps" id="find-steps">
        <div class="find-step active" id="step-dot-1">
          <span class="step-dot">1</span>
          <span class="step-label">본인 확인</span>
        </div>
        <div class="find-step-line"></div>
        <div class="find-step" id="step-dot-2">
          <span class="step-dot">2</span>
          <span class="step-label">새 비밀번호</span>
        </div>
        <div class="find-step-line"></div>
        <div class="find-step" id="step-dot-3">
          <span class="step-dot">3</span>
          <span class="step-label">완료</span>
        </div>
      </div>

      <!-- STEP 1: 본인 확인 -->
      <div id="pw-step1" class="find-panel">
        <form onsubmit="verifyIdentity(event)" novalidate>
          <div class="reg-field" style="margin-bottom:14px">
            <label class="reg-label" for="fp-id">아이디 <span class="req">*</span></label>
            <input type="text" id="fp-id" class="reg-input" placeholder="가입한 아이디 입력" autocomplete="username" />
            <span class="field-msg" id="msg-fp-id"></span>
          </div>
          <div class="reg-field" style="margin-bottom:14px">
            <label class="reg-label" for="fp-name">이름 <span class="req">*</span></label>
            <input type="text" id="fp-name" class="reg-input" placeholder="가입 시 등록한 이름" />
            <span class="field-msg" id="msg-fp-name"></span>
          </div>
          <div class="reg-field" style="margin-bottom:20px">
            <label class="reg-label" for="fp-tel">전화번호 <span class="req">*</span></label>
            <input type="tel" id="fp-tel" class="reg-input" placeholder="010-0000-0000" maxlength="13" />
            <span class="field-msg" id="msg-fp-tel"></span>
          </div>
          <button type="submit" class="reg-btn">
            <i class="fas fa-check-circle"></i> 본인 확인
          </button>
        </form>
      </div>

      <!-- STEP 2: 새 비밀번호 입력 -->
      <div id="pw-step2" class="find-panel hidden">
        <div class="find-verified-badge">
          <i class="fas fa-user-check"></i>
          <span id="verified-id-display"></span> 님, 본인 확인 완료
        </div>
        <form onsubmit="resetPassword(event)" novalidate>
          <input type="text" autocomplete="username" style="display:none" aria-hidden="true" />
          <div class="reg-field" style="margin-bottom:14px">
            <label class="reg-label" for="fp-new-pw">새 비밀번호 <span class="req">*</span></label>
            <div class="pw-input-wrap">
              <input type="password" id="fp-new-pw" class="reg-input" placeholder="영문+숫자 조합 8자 이상" autocomplete="new-password" />
              <button type="button" class="pw-toggle-btn" onclick="toggleFpPw('fp-new-pw','fp-eye1')" tabindex="-1">
                <i class="fas fa-eye" id="fp-eye1"></i>
              </button>
            </div>
            <span class="field-msg" id="msg-fp-new-pw"></span>
          </div>
          <div class="reg-field" style="margin-bottom:20px">
            <label class="reg-label" for="fp-new-pw2">새 비밀번호 확인 <span class="req">*</span></label>
            <div class="pw-input-wrap">
              <input type="password" id="fp-new-pw2" class="reg-input" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password" />
              <button type="button" class="pw-toggle-btn" onclick="toggleFpPw('fp-new-pw2','fp-eye2')" tabindex="-1">
                <i class="fas fa-eye" id="fp-eye2"></i>
              </button>
            </div>
            <span class="field-msg" id="msg-fp-new-pw2"></span>
          </div>

          <!-- 비밀번호 강도 바 -->
          <div class="pw-strength-wrap" id="pw-strength-wrap">
            <div class="pw-strength-bar">
              <div class="pw-strength-fill" id="pw-strength-fill"></div>
            </div>
            <span class="pw-strength-label" id="pw-strength-label"></span>
          </div>

          <button type="submit" class="reg-btn" style="margin-top:8px">
            <i class="fas fa-lock"></i> 비밀번호 변경
          </button>
        </form>
      </div>

      <!-- STEP 3: 완료 -->
      <div id="pw-step3" class="find-panel hidden">
        <div class="find-done-wrap">
          <div class="find-done-icon"><i class="fas fa-check-circle"></i></div>
          <h3 class="find-done-title">비밀번호가 변경되었습니다!</h3>
          <p class="find-done-desc">새 비밀번호로 로그인해 주세요.</p>
          <button class="reg-btn" onclick="window.location.href='index.html'" style="margin-top:8px">
            <i class="fas fa-sign-in-alt"></i> 로그인하기
          </button>
        </div>
      </div>

      <!-- 하단 링크 -->
      <div class="find-bottom-links" id="pw-bottom-links">
        <a href="index.html"><i class="fas fa-arrow-left"></i> 로그인으로</a>
        <span class="f-sep">|</span>
        <a href="find-id.html">아이디 찾기</a>
        <span class="f-sep">|</span>
        <a href="register.html">회원가입</a>
      </div>

    </div>
